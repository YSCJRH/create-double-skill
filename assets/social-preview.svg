<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">create-double-skill</title>
  <desc id="desc">A local-first digital double builder focused on voice, values, and decision style.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf7ef"/>
      <stop offset="55%" stop-color="#f2efe4"/>
      <stop offset="100%" stop-color="#e8f0ea"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3a2f"/>
      <stop offset="100%" stop-color="#2f6f55"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#173126" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1110" cy="120" r="150" fill="#d7e9dc" opacity="0.55"/>
  <circle cx="1030" cy="520" r="200" fill="#dce7f1" opacity="0.55"/>
  <circle cx="160" cy="110" r="110" fill="#efe2d7" opacity="0.65"/>

  <rect x="82" y="78" width="1116" height="484" rx="34" fill="#fffdf8" filter="url(#shadow)"/>
  <rect x="82" y="78" width="1116" height="484" rx="34" fill="none" stroke="#d7dfd4"/>

  <rect x="116" y="116" width="168" height="44" rx="22" fill="#1f4c3a"/>
  <text x="200" y="145" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#f6f7f2">LOCAL-FIRST</text>

  <rect x="304" y="116" width="182" height="44" rx="22" fill="#dfeadf"/>
  <text x="395" y="145" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1f4c3a">HIGH-SIGNAL</text>

  <rect x="506" y="116" width="244" height="44" rx="22" fill="#ecf0f6"/>
  <text x="628" y="145" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#284455">UNCERTAINTY-AWARE</text>

  <text x="118" y="246" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="700" fill="#17251d">create-double-skill</text>
  <text x="118" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="600" fill="#30453a">Build a private digital double</text>
  <text x="118" y="365" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#4c6257">Capture how you speak, decide, and draw boundaries.</text>

  <g transform="translate(118 422)">
    <rect width="468" height="92" rx="22" fill="#f4f0e6"/>
    <text x="28" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#5c4a34">Not a life-log</text>
    <text x="28" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#6a5b49">Not a memory simulator</text>
  </g>

  <g transform="translate(614 422)">
    <rect width="228" height="92" rx="22" fill="#edf5ef"/>
    <text x="28" y="40" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700" fill="#214936">Voice</text>
    <text x="28" y="71" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#214936">Values</text>
  </g>

  <g transform="translate(862 422)">
    <rect width="302" height="92" rx="22" fill="#edf1f8"/>
    <text x="28" y="40" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700" fill="#29405a">Decision style</text>
    <text x="28" y="71" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#29405a">Corrections welcome</text>
  </g>

  <rect x="118" y="548" width="1046" height="2" fill="url(#accent)" opacity="0.5"/>
</svg>
